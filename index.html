    position: fixed;
    inset: 0;
    z-index: 10;
    pointer-events: none;
    background: repeating-linear-gradient(

      transparent,
      transparent 2px,
      rgba(0, 20, 30, 0.08) 2px,
      rgba(0, 20, 30, 0.08) 4px
    );
  }

  /* CRT vignette */
  .vignette {
    position: fixed;
    inset: 0;
    z-index: 11;
    pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(4, 8, 14, 0.7) 100%);
  }

  /* Chromatic aberration flicker — subtle */
  .flicker {
    position: fixed;
    inset: 0;
    z-index: 9;
    pointer-events: none;
    animation: flicker 8s infinite;
    opacity: 0;
  }

  @keyframes flicker {
    0%, 95%, 100% { opacity: 0; }
    96% { opacity: 0.03; background: rgba(0, 255, 200, 0.02); }
    97% { opacity: 0; }
    98% { opacity: 0.02; background: rgba(200, 0, 255, 0.01); }
  }

  /* Border frame */
  .frame {
    position: fixed;
    inset: 8px;
    border: 1px solid rgba(100, 180, 200, 0.15);
    z-index: 12;
    pointer-events: none;
  }

  .frame::before {
    content: '';
    position: absolute;
    top: -1px; left: 20px; right: 20px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(100, 200, 220, 0.3), transparent);
  }

  /* HUD panels */
  .hud {
    position: fixed;
    z-index: 20;
    pointer-events: none;
  }

  /* Top left — system label */
  .hud-top-left {
    top: 20px;
    left: 24px;
  }

  .hud-top-left .sys-label {
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 4px;
    color: rgba(100, 180, 200, 0.55);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .hud-top-left .title {
    font-size: 24px;
    font-weight: 600;
    letter-spacing: 6px;
    color: rgba(140, 220, 240, 0.9);
    text-transform: uppercase;
  }

  .hud-top-left .subtitle {
    font-size: 13px;
    color: rgba(100, 180, 200, 0.5);
    letter-spacing: 2px;
    margin-top: 4px;
  }

  /* Left panel — stratum readout */
  .hud-left {
    top: 100px;
    left: 24px;
    width: 180px;
  }

  .stratum-list {
    list-style: none;
  }

  .stratum-item {
    padding: 5px 10px;
    margin: 3px 0;
    font-size: 12px;
    font-weight: 400;
    letter-spacing: 1px;
    border-left: 2px solid rgba(100, 180, 200, 0.15);
    color: rgba(100, 180, 200, 0.5);
    transition: all 0.3s;
    cursor: pointer;
    pointer-events: all;
  }

  .stratum-item:hover, .stratum-item.active {
    border-left-color: rgba(140, 220, 240, 0.8);
    color: rgba(140, 220, 240, 0.95);
    background: rgba(100, 180, 200, 0.07);
  }

  .stratum-item .depth {
    color: rgba(100, 180, 200, 0.35);
    margin-right: 8px;
  }

  /* Right panel — analysis data */
  .hud-right {
    top: 100px;
    right: 24px;
    width: 260px;
    text-align: right;
  }

  .analysis-panel {
    background: rgba(10, 20, 30, 0.7);
    border: 1px solid rgba(100, 180, 200, 0.15);
    padding: 16px 18px;
    font-size: 12px;
    line-height: 1.9;
    letter-spacing: 1px;
    opacity: 0;
    transition: opacity 0.4s;
    max-height: calc(100vh - 160px);
    overflow-y: auto;
    pointer-events: all;
    scrollbar-width: thin;
    scrollbar-color: rgba(100, 180, 200, 0.2) transparent;
  }

  .analysis-panel.visible { opacity: 1; }

  .analysis-panel .panel-title {
    color: rgba(140, 220, 240, 0.7);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid rgba(100, 180, 200, 0.15);
  }

  .analysis-panel .row {
    display: flex;
    justify-content: space-between;
    color: rgba(100, 180, 200, 0.6);
  }

  .analysis-panel .row .val {
    color: rgba(160, 230, 245, 0.9);
    font-weight: 500;
  }

  .analysis-panel .bar-container {
    margin: 6px 0;
    height: 4px;
    background: rgba(100, 180, 200, 0.1);
    position: relative;
  }

  .analysis-panel .bar-fill {
    height: 100%;
    transition: width 0.5s;
  }

  .cat-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin: 4px 0;
  }

  .cat-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    display: inline-block;
    margin-right: 7px;
    opacity: 0.8;
  }

  .cat-label {
    color: rgba(100, 180, 200, 0.6);
    font-size: 11px;
    flex: 1;
    text-align: left;
    display: flex;
    align-items: center;
  }

  .cat-val {
    color: rgba(160, 230, 245, 0.85);
    font-weight: 500;
  }

  /* Bottom status bar */
  .hud-bottom {
    bottom: 18px;
    left: 24px;
    right: 24px;
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 2px;
    color: rgba(100, 180, 200, 0.4);
    text-transform: uppercase;

    display: inline-block;
    width: 6px;
    height: 6px;

    0%, 100% { opacity: 0.3; }

    width: 16px;
    height: 4px;
    opacity: 0.7;
  }

    position: fixed;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    z-index: 20;
    pointer-events: none;
  }

  .depth-tick {
    font-size: 10px;
    color: rgba(100, 180, 200, 0.3);
    letter-spacing: 1px;
    text-align: right;
    padding: 8px 0;

  /* Task tooltip */

  if (!months[key]) months[key] = { date: key, tasks: [], days: [] };
  months[key].tasks.push(...day.tasks);
  months[key].days.push(day);
});

// Newest on top (highest Y)
const monthArr = Object.values(months).sort((a, b) => a.date.localeCompare(b.date));
const maxTasks = Math.max(...monthArr.map(m => m.tasks.length));

// ===== BUILD CORE SAMPLE =====
const coreGroup = new THREE.Group();

const layerHeight = 0.28;
const coreW = 3.0;  // width (X)
const coreD = 2.0;  // depth (Z)
const layerMeshes = []; // for raycasting
const taskMeshes = [];  // for task click detection

// Holographic shader material
function createHoloMaterial(color, opacity, completion) {
  return new THREE.MeshPhysicalMaterial({
    color: color,
    transparent: true,
    opacity: opacity,
    roughness: 0.4,
    metalness: 0.6,
    emissive: color,
    emissiveIntensity: 0.15 + completion * 0.25,
    side: THREE.DoubleSide,
    depthWrite: false
  });
}

// Wireframe overlay material
function createWireMaterial(color) {
  return new THREE.MeshBasicMaterial({
    color: color,
    transparent: true,
    opacity: 0.08,
    wireframe: true
  });
}

monthArr.forEach((month, mi) => {
  const y = mi * layerHeight;
  const totalTasks = month.tasks.length;
  const doneTasks = month.tasks.filter(t => t.completed).length;
  const completion = totalTasks > 0 ? doneTasks / totalTasks : 0;

  // Category segments laid out as horizontal bands within the cuboid layer
  // Each category gets a proportional slice along the X axis
  let xOffset = -coreW / 2;

  catOrder.forEach(cat => {
    const catTasks = month.tasks.filter(t => t.category === cat);
    if (catTasks.length === 0) return;

    const proportion = catTasks.length / totalTasks;
    const catDone = catTasks.filter(t => t.completed).length;
    const catCompletion = catTasks.length > 0 ? catDone / catTasks.length : 0;
    const segW = coreW * proportion;

    const catColor = CATS[cat].color;

    // Solid block segment
    const segGeo = new THREE.BoxGeometry(segW, layerHeight * 0.85, coreD);
    const segMat = createHoloMaterial(catColor, 0.12 + catCompletion * 0.35, catCompletion);
    const segMesh = new THREE.Mesh(segGeo, segMat);
    segMesh.position.set(xOffset + segW / 2, y, 0);
    coreGroup.add(segMesh);

    // Top cap plane for segment
    const capGeo = new THREE.PlaneGeometry(segW, coreD);
    const capMat = new THREE.MeshBasicMaterial({
      color: catColor,
      transparent: true,
      opacity: 0.06 + catCompletion * 0.15,
      side: THREE.DoubleSide,
      depthWrite: false
    });
    const topCap = new THREE.Mesh(capGeo, capMat);
    topCap.rotation.x = -Math.PI / 2;
    topCap.position.set(xOffset + segW / 2, y + layerHeight * 0.425, 0);
    coreGroup.add(topCap);

    // Fossil particles for uncompleted tasks
    const undoneTasks = catTasks.filter(t => !t.completed);
    for (let f = 0; f < undoneTasks.length; f++) {
      const fx = xOffset + Math.random() * segW;
      const fz = (Math.random() - 0.5) * coreD * 0.85;
      const fy = y + (Math.random() - 0.5) * layerHeight * 0.6;

      const fossilGeo = new THREE.IcosahedronGeometry(0.06 + Math.random() * 0.04, 0);
      const fossilMat = new THREE.MeshBasicMaterial({
        color: catColor,
        transparent: true,
        opacity: 0.3,
        wireframe: true
      });
      const fossil = new THREE.Mesh(fossilGeo, fossilMat);
      fossil.position.set(fx, fy, fz);
      fossil.userData = { task: undoneTasks[f], category: cat };
      coreGroup.add(fossil);
      taskMeshes.push(fossil);
    }

    // Crystal points for completed tasks
    const doneTasks = catTasks.filter(t => t.completed);
    for (let c = 0; c < doneTasks.length; c++) {
      const cx = xOffset + Math.random() * segW;
      const cz = (Math.random() - 0.5) * coreD * 0.85;
      const cy = y + (Math.random() - 0.5) * layerHeight * 0.5;

      const crystalGeo = new THREE.OctahedronGeometry(0.05 + Math.random() * 0.03, 0);
      const crystalMat = new THREE.MeshBasicMaterial({
        color: catColor,
        transparent: true,
        opacity: 0.5 + Math.random() * 0.3
      });
      const crystal = new THREE.Mesh(crystalGeo, crystalMat);
      crystal.position.set(cx, cy, cz);
      crystal.rotation.set(Math.random(), Math.random(), Math.random());
      crystal.userData = { task: doneTasks[c], category: cat };
      coreGroup.add(crystal);
      taskMeshes.push(crystal);
    }

    xOffset += segW;
  });

  // Wireframe box outline for this layer
  const wireGeo = new THREE.BoxGeometry(coreW, layerHeight * 0.85, coreD);
  const wireMat = createWireMaterial(new THREE.Color(0.4, 0.7, 0.8));
  const wireMesh = new THREE.Mesh(wireGeo, wireMat);
  wireMesh.position.y = y;
  coreGroup.add(wireMesh);

  // Edge lines for sharper definition
  const edgesGeo = new THREE.EdgesGeometry(wireGeo);
  const edgesMat = new THREE.LineBasicMaterial({
    color: 0x4080a0,
    transparent: true,
    opacity: 0.1
  });
  const edges = new THREE.LineSegments(edgesGeo, edgesMat);
  edges.position.y = y;
  coreGroup.add(edges);

  // Invisible hitbox for raycasting
  const hitGeo = new THREE.BoxGeometry(coreW + 0.2, layerHeight, coreD + 0.2);
  const hitMat = new THREE.MeshBasicMaterial({ visible: false });
  const hitMesh = new THREE.Mesh(hitGeo, hitMat);
  hitMesh.position.y = y;
  hitMesh.userData = { monthIndex: mi, month: month };
  coreGroup.add(hitMesh);
  layerMeshes.push(hitMesh);

  // Thin separator line at layer top
  const sepGeo = new THREE.PlaneGeometry(coreW + 0.06, coreD + 0.06);
  const sepMat = new THREE.MeshBasicMaterial({
    color: 0x4080a0,
    transparent: true,
    opacity: 0.06,
    side: THREE.DoubleSide,
    depthWrite: false
  });
  const sep = new THREE.Mesh(sepGeo, sepMat);
  sep.rotation.x = -Math.PI / 2;
  sep.position.y = y + layerHeight * 0.425;
  coreGroup.add(sep);
});

// Center the core vertically

  depthWrite: false
});
const scanPlane = new THREE.Mesh(scanGeo, scanMat);
scanPlane.rotation.x = -Math.PI / 2;
coreGroup.add(scanPlane);

// Vertical scan beams at the four corners of the cuboid
const halfW = coreW / 2 + 0.4;
const halfD = coreD / 2 + 0.4;
const corners = [[-halfW, -halfD], [halfW, -halfD], [halfW, halfD], [-halfW, halfD]];
corners.forEach(([bx, bz]) => {
  const beamGeo = new THREE.CylinderGeometry(0.005, 0.005, totalHeight + 2, 4);
  const beamMat = new THREE.MeshBasicMaterial({
    color: 0x2a6070,
    transparent: true,
    opacity: 0.1
  });
  const beam = new THREE.Mesh(beamGeo, beamMat);
  beam.position.set(bx, totalHeight / 2, bz);
  coreGroup.add(beam);
});

// ===== HUD: Stratum List =====
const stratumList = document.getElementById('stratum-list');
// Show a subset — newest first to match the core sample visual
const listStep = Math.max(1, Math.floor(monthArr.length / 20));
const listIndices = [];
monthArr.forEach((month, mi) => {
  if (mi % listStep === 0 || mi === monthArr.length - 1) listIndices.push(mi);
});
listIndices.reverse().forEach(mi => {
  const month = monthArr[mi];
  const dt = new Date(month.date + '-15T12:00:00');
  const label = dt.toLocaleDateString('en-US', { month: 'short', year: '2-digit' }).toUpperCase();
  const li = document.createElement('li');
  li.className = 'stratum-item';
  li.innerHTML = `<span class="depth">${String(mi).padStart(3, '0')}</span>${label}`;
  li.dataset.index = mi;
  li.addEventListener('click', () => selectStratum(mi));
  stratumList.appendChild(li);
});

// ===== Legend =====
const legendPanel = document.getElementById('legend-panel');
catOrder.forEach(cat => {
  const c = CATS[cat];
  legendPanel.innerHTML += `<div class="legend-row"><span>${c.label}</span><div class="legend-swatch" style="background:${c.hex}"></div></div>`;
});

// ===== Raycasting =====
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let selectedMonth = null;
let highlightRing = null;

// Highlight frame — rectangular outline around the selected layer
const hlShape = new THREE.Shape();
const hlW = coreW / 2 + 0.12;
const hlD = coreD / 2 + 0.12;
hlShape.moveTo(-hlW, -hlD);
hlShape.lineTo(hlW, -hlD);
hlShape.lineTo(hlW, hlD);
hlShape.lineTo(-hlW, hlD);
hlShape.lineTo(-hlW, -hlD);
const hlHole = new THREE.Path();
const hlW2 = coreW / 2 + 0.06;
const hlD2 = coreD / 2 + 0.06;
hlHole.moveTo(-hlW2, -hlD2);
hlHole.lineTo(hlW2, -hlD2);
hlHole.lineTo(hlW2, hlD2);
hlHole.lineTo(-hlW2, hlD2);
hlHole.lineTo(-hlW2, -hlD2);
hlShape.holes.push(hlHole);
const hlGeo = new THREE.ShapeGeometry(hlShape);
const hlMat = new THREE.MeshBasicMaterial({
  color: 0x40d0e0,
  transparent: true,
  opacity: 0.6,
  side: THREE.DoubleSide,
  depthWrite: false
});
highlightRing = new THREE.Mesh(hlGeo, hlMat);
highlightRing.rotation.x = -Math.PI / 2;
highlightRing.visible = false;
coreGroup.add(highlightRing);

function selectStratum(mi) {
  const month = monthArr[mi];
  selectedMonth = mi;

  // Position highlight ring
  const y = mi * layerHeight;
  highlightRing.position.y = y;
  highlightRing.visible = true;

  // Update stratum list
  document.querySelectorAll('.stratum-item').forEach(el => {
    el.classList.toggle('active', parseInt(el.dataset.index) === mi);
  });

  // Update analysis panel
  const panel = document.getElementById('analysis-panel');
  panel.classList.add('visible');

  const dt = new Date(month.date + '-15T12:00:00');
  const dateLabel = dt.toLocaleDateString('en-US', { month: 'long', year: 'numeric' }).toUpperCase();
  const total = month.tasks.length;
  const done = month.tasks.filter(t => t.completed).length;
  const rate = total > 0 ? Math.round(done / total * 100) : 0;

  let html = `
    <div class="row"><span>MONTH</span><span class="val">${dateLabel}</span></div>
    <div class="row"><span>TOTAL TASKS</span><span class="val">${total}</span></div>
    <div class="row"><span>COMPLETED</span><span class="val">${done} (${rate}%)</span></div>
    <div class="row"><span>INCOMPLETE</span><span class="val">${total - done}</span></div>
    <div class="bar-container"><div class="bar-fill" style="width:${rate}%;background:rgba(100,220,200,0.5)"></div></div>
    <div style="margin-top:8px;padding-top:6px;border-top:1px solid rgba(100,180,200,0.1);">
      <div style="color:rgba(140,220,240,0.5);font-size:10px;font-weight:500;letter-spacing:2px;margin-bottom:6px;">COMPOSITION</div>
  `;

  catOrder.forEach(cat => {
    const catTasks = month.tasks.filter(t => t.category === cat);
    if (catTasks.length === 0) return;
    const catDone = catTasks.filter(t => t.completed).length;
    html += `<div class="cat-row">
      <span class="cat-label"><span class="cat-dot" style="background:${CATS[cat].hex}"></span>${CATS[cat].label}</span>
      <span class="cat-val">${catDone}/${catTasks.length}</span>
    </div>`;
  });

  // Stratum summary
  const summaryKey = month.date;
  if (SUMMARIES[summaryKey]) {
    html += `<div style="margin-top:10px;padding-top:8px;border-top:1px solid rgba(100,180,200,0.12);">
      <div style="color:rgba(140,220,240,0.55);font-size:10px;font-weight:500;letter-spacing:2px;margin-bottom:6px;">FIELD NOTES</div>
      <div style="color:rgba(180,220,235,0.75);font-size:11px;line-height:1.6;font-style:italic;text-align:left;">${SUMMARIES[summaryKey]}</div>
    </div>`;
  }

  // Show some actual task texts
  html += `<div style="margin-top:10px;padding-top:8px;border-top:1px solid rgba(100,180,200,0.12);">
    <div style="color:rgba(140,220,240,0.5);font-size:10px;font-weight:500;letter-spacing:2px;margin-bottom:6px;">SPECIMEN LOG</div>`;

  month.tasks.slice(0, 8).forEach(t => {
    const icon = t.completed ? '\u25C6' : '\u25C7';
    const opacity = t.completed ? 0.7 : 0.35;
    const text = t.text.length > 28 ? t.text.slice(0, 28) + '...' : t.text;
    html += `<div style="color:rgba(160,230,245,${opacity});font-size:11px;margin:2px 0;text-align:left;">
      <span style="color:${CATS[t.category].hex}">${icon}</span> ${text}
    </div>`;
  });

  if (month.tasks.length > 8) {
    html += `<div style="color:rgba(100,180,200,0.25);font-size:10px;margin-top:4px;text-align:left;">+ ${month.tasks.length - 8} more</div>`;
  }

  html += `</div>`;

  document.getElementById('analysis-content').innerHTML = html;

  // Smooth camera towards the layer
  const worldY = y + coreGroup.position.y;
  controls.target.lerp(new THREE.Vector3(0, worldY, 0), 0.3);
}

// Click detection
// Task tooltip state
let activeTaskMesh = null;
const taskTooltip = document.getElementById('task-tooltip');
const leaderLine = document.getElementById('leader-line');
const leaderSvg = document.getElementById('leader-svg');

function showTaskTooltip(mesh) {
  const task = mesh.userData.task;
  const cat = mesh.userData.category;
  const catInfo = CATS[cat] || CATS.personal;
  const status = task.completed ? 'COMPLETED' : 'INCOMPLETE';
  const statusColor = task.completed ? 'rgba(100,220,180,0.7)' : 'rgba(220,140,100,0.7)';

  taskTooltip.innerHTML = `
    <div class="tt-status" style="color:${statusColor}">${status}</div>
    <div class="tt-text">${task.text}</div>
    <div class="tt-cat" style="color:${catInfo.hex}">${catInfo.label}</div>
  `;
  taskTooltip.classList.add('visible');
  activeTaskMesh = mesh;
}

function hideTaskTooltip() {
  taskTooltip.classList.remove('visible');
  leaderLine.setAttribute('x1', 0);
  leaderLine.setAttribute('y1', 0);
  leaderLine.setAttribute('x2', 0);
  leaderLine.setAttribute('y2', 0);
  activeTaskMesh = null;
}

function updateTaskTooltipPosition() {
  if (!activeTaskMesh) return;

  // Get world position of the task mesh
  const worldPos = new THREE.Vector3();
  activeTaskMesh.getWorldPosition(worldPos);

  // Project to screen
  const screenPos = worldPos.clone().project(camera);
  const sx = (screenPos.x * 0.5 + 0.5) * window.innerWidth;
  const sy = (-screenPos.y * 0.5 + 0.5) * window.innerHeight;

  // Position tooltip offset to the right and up
  const ttX = sx + 60;
  const ttY = sy - 40;

  // Clamp to viewport
  const rect = taskTooltip.getBoundingClientRect();
  const clampedX = Math.min(ttX, window.innerWidth - rect.width - 20);
  const clampedY = Math.max(20, Math.min(ttY, window.innerHeight - rect.height - 20));

  taskTooltip.style.left = clampedX + 'px';
  taskTooltip.style.top = clampedY + 'px';

  // Update leader line
  leaderLine.setAttribute('x1', sx);
  leaderLine.setAttribute('y1', sy);
  leaderLine.setAttribute('x2', clampedX);
  leaderLine.setAttribute('y2', clampedY + (rect.height / 2 || 20));
}

renderer.domElement.addEventListener('click', (e) => {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);

  // Check task meshes first (with a small threshold since they're tiny)
  const taskHits = raycaster.intersectObjects(taskMeshes);
  if (taskHits.length > 0 && taskHits[0].distance < 20) {
    // If clicking the same one, toggle off
    if (activeTaskMesh === taskHits[0].object) {
      hideTaskTooltip();
    } else {
      showTaskTooltip(taskHits[0].object);
      updateTaskTooltipPosition();
    }
    return;
  }

  // Fall back to layer selection
  const layerHits = raycaster.intersectObjects(layerMeshes);
  if (layerHits.length > 0) {
    hideTaskTooltip();
    selectStratum(layerHits[0].object.userData.monthIndex);
  } else {
    hideTaskTooltip();
  }
});

// Fade instructions
setTimeout(() => {
  const inst = document.getElementById('instructions');
  if (inst) inst.style.opacity = '0';
}, 6000);

// ===== ANIMATION =====
let time = 0;

function animate() {
  requestAnimationFrame(animate);
  time += 0.01;

  controls.update();

  // Scanning plane animation
  const scanY = ((Math.sin(time * 0.5) + 1) / 2) * totalHeight;
  scanPlane.position.y = scanY;
  scanMat.opacity = 0.04 + Math.sin(time * 2) * 0.03;

  // Pulse highlight ring
  if (highlightRing.visible) {
    hlMat.opacity = 0.3 + Math.sin(time * 3) * 0.2;
  }

  // Update task tooltip leader line position as camera orbits
  if (activeTaskMesh) {
    updateTaskTooltipPosition();
  }

  composer.render();
}

animate();

// ===== RESIZE =====
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  composer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
